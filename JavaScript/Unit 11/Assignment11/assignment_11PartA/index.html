<!DOCTYPE html>
<html>
    <head>
        <title> Assignment 11 </title>
        <style>
            h1 {
                text-align: center;
                margin:0px;
                padding:20px;
                background-color: rgb(255, 174, 0);
                color:#fefefe;
            }

            body {
                margin: 0px;
            }

            li {
                display: inline;
                padding:30px;
            }

            ul {
                text-align:center;
                padding:10px 0px;
                margin:0px;
                background-color: rgb(255, 190, 48);
                color:white;
            }

            h4, p {
                margin:auto;
                width:fit-content;
                padding:10px;
            }
        </style>
        <script src="jquery-3.7.0.min.js"></script>
        <script>
            colors = ["red", "blue", "green", "orange","yellow","black","cyan"]
            themes = [orange = ["rgb(255, 174, 0)", "rgb(255, 190, 48)"], red = ["rgb(255 0 0)", "rgb(255 48 48)"], blue=["rgb(0 132 255)","rgb(48 150 255)"], green = ["rgb(0 255 0)","rgb(48 255 83)"]]

            var pClicked = function() {
                $("#p").css("color", colors[Math.floor((Math.random()*6))])
            }

            var startLoop = function() {
                setTimeout(function(){
                    var color = themes[Math.floor((Math.random()*4))]
                    $("#header").css("background-color", color[0])
                    $("#nav").css("background-color", color[1])
                startLoop()}, 2000);
            }
        </script>
    </head>
    <body onload="startLoop()">
        <h1 id="header"> My Website</h1>
        <nav>
            <ul id="nav">
                <li> Link 1 </li>
                <li> Link 2 </li>
                <li> Link 3 </li>
                <li> Link 4</li>
            </ul>
        </nav>
        <section>
            <h4> Welcome </h4>
            <p onclick="pClicked()" id = "p"> Welcome to my website. Click me! </p>
        </section>
    </body>
</html>
