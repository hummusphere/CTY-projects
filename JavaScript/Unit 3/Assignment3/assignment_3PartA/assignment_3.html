<!DOCTYPE html>

<html>
  <head>
    <title>Unit 2 Assignment</title>
    

  </head>
  <body>
    
    Customer Name: 
    
    <input type="text" id="name" /><br />
    
    Item Name 
    
    <select id="fruits">
      <option value="apple">Apple</option>
      <option value="mango">Mango</option>
      <option value="orange">Orange</option>
      <option value="banana">Banana</option>
    </select><br/>
    
    Quantity  
    <input type="text" id="qty" /><br />
    
    Unit Price 
    <input id="unitPrice" type="number">

    <br/>
    Sales Tax 

    <select id="tax">
      <option value="0.025">2.5%</option>
      <option value="0.05">5%</option>
      <option value="0.08">8%</option>
      <option value="0.10">10%</option>
      <option value="0.60">60%</option>
      <option value="1">100%</option>
      <option value="2">200%</option>
    </select>

    <br />

    <button id="calculateButton" onclick="calculateTotal()" />Calculate Total</button>

    <br/>
    
    <p id="output"></p>
    <script type="application/javascript" src="assignment_2.js"></script>
  </body>
</html>
