                    <figcaption class="padding"> Great game, immserive story, great artwork, and an amazing soundtrack. Unlike any other game, Deltarune makes it clear that your choices don't matter. It also explores the concept of your character not wanting to be controled. Even with only two chapters out, Deltarune already has many different battles with many unique bosses. You have to choice to befriend your enemies.</figcaption>

                    <figcaption> Animal Crossing New Horizons is the newest release of the Animal Crossing franchise. The graphics for the game are amazing. The game gives you freedom to build the town of your dreams, while also meeting new residents and visting other islands. You can travel to other islands to trade for rare fruit, furniture, and other items. With alot of furniture items, its impossible to run out of ides while building your island. </figcaption>
