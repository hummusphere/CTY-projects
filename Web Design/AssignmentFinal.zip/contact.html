        <!--Heading-->
        <h1 class="font">Contact Us</h1>
        <!--Form-->
        <form action="" method="get">
            <span class="font"> First Name and Last Name: </span>
             <br><br>
            <textarea>Type Here ...</textarea>
            <br>
            <span class="font"> Email : </span>
            <br><br>
            <textarea >Type Here ...</textarea>
            <br>
            <span class="font"> Rate our website (0-100):  </span> 
            <br> <br>
            <input type="number" name="rate" min = "0" max = "100" step ="1"/>
            <br>
            <span class="font"> What genre of books are you most likely to read?  </span> 
            <br> <br>
            <select>
                <option > Mystery </option>
                <option > Fantasy </option>
                <option > Adventure </option>
                <option > Fairy Tale </option>
                <option > Mythology </option>
                <option > Drama </option>
                <option > Romance </option>
            </select>
            <br>
            <span class="font"> Which Type of Book Do You Prefer?  </span> 
            <br> <br>
            <input type="radio" name="type" value="Fiction" class="font"/> Fiction 
            <br>
            <input type="radio" name="type" value="Nonfiction" class="font" /> Nonfiction
             <br>
            <span class="font"> Where do you get books?  </span> 
            <br> <br>
            <input type="checkbox" name="type" value="$1-$20" class="font"/> Online <br>
            <input type="checkbox" name="type" value="Nonfiction" class="font"/> Library <br>
            <input type="checkbox" name="type" value="Nonfiction" class="font"/> Ebooks <br>
            <input type="checkbox" name="type" value="Nonfiction" class="font"/> Bookstore <br>
            <br>
            <br>
            <span class="font"> Comments: </span>
            <br><br>
           <textarea class="font">Type Here ...</textarea>
           <br>
           <br>
           <input type="reset" name="Reset" value="Reset" />
            <input type="submit" name="Submit Form" value="Submit Form" /> <br>
            
        </form>
    </head>
